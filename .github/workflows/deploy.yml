name: Deploy to Naver Cloud Object Storage

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to NCP Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NCP_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NCP_SECRET_KEY }}
        run: |
          # 1. Configure signatures andAddressing style
          aws configure set default.s3.signature_version s3v4
          aws configure set default.s3.addressing_style virtual
          
          # 2. Diagnostic: Can we even list the bucket?
          echo "Checking bucket access..."
          aws s3 ls s3://archemist-roasters --endpoint-url https://kr.object.ncloudstorage.com --region kr-standard
          
          # 3. Final synchronization attempt
          aws s3 sync dist/ s3://archemist-roasters --endpoint-url https://kr.object.ncloudstorage.com --region kr-standard --delete --debug
