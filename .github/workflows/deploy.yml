# Deployment Version: 1.4 (Main account keys: ncp-3681292-0 active)
name: Deploy to Naver Cloud Object Storage

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --force

      - name: Build
        run: npm run build

      - name: Deploy to NCP Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NCP_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NCP_SECRET_KEY }}
          BUCKET_NAME: "archemist"
        run: |
          aws configure set default.s3.signature_version s3v4
          aws configure set default.s3.addressing_style path
          
          # Disable modern checksums that NCP doesn't support (Global)
          aws configure set default.request_checksum_calculation when_required
          aws configure set default.response_checksum_validation when_required

          # Debug: check bucket's ACL permissions
          aws s3api get-bucket-acl --bucket ${BUCKET_NAME} \
            --endpoint-url https://kr.object.ncloudstorage.com \
            --region kr-standard || echo "Could not get bucket ACL"

          aws s3 sync dist/ s3://${BUCKET_NAME} \
            --endpoint-url https://kr.object.ncloudstorage.com \
            --region kr-standard \
            --delete \
            --no-progress
