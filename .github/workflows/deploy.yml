# Deployment Version: 1.2 (Sub-account: archemist-deployer active)
name: Deploy to Naver Cloud Object Storage

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to NCP Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NCP_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NCP_SECRET_KEY }}
          BUCKET_NAME: "archemist"
        run: |
          echo "Checking build output..."
          ls -al
          ls -al dist || echo "dist not found"

          # 1. Configure signatures and Addressing style
          aws configure set default.s3.signature_version s3v4
          aws configure set default.s3.addressing_style path

          echo "Target Bucket: ${BUCKET_NAME}"
          echo "Test 1: Simple PutObject (s3api)"
          echo "test" > test.txt
          aws s3api put-object --bucket ${BUCKET_NAME} --key test.txt --body test.txt --endpoint-url https://kr.object.ncloudstorage.com || echo "Test 1 Failed"

          echo "Test 2: PutObject with public-read ACL"
          aws s3api put-object --bucket ${BUCKET_NAME} --key test-acl.txt --body test.txt --acl public-read --endpoint-url https://kr.object.ncloudstorage.com || echo "Test 2 Failed"

          echo "Test 3: Standard S3 Sync (No ACL, No Delete)"
          aws s3 sync dist/ s3://${BUCKET_NAME} --endpoint-url https://kr.object.ncloudstorage.com || echo "Test 3 Failed"

          echo "Final Attempt: Full Production Sync"
          aws s3 sync dist/ s3://${BUCKET_NAME} \
            --endpoint-url https://kr.object.ncloudstorage.com \
            --delete \
            --acl public-read \
            --addressing-style path
